name: avesapp
description: "Una aplicación móvil para aves con autenticación Firebase"

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.4.3 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase - versiones estables compatibles
  firebase_core: ^2.15.1
  firebase_auth: ^4.7.3
  cloud_firestore: ^4.8.5
  firebase_storage: ^11.2.6
  google_sign_in: ^6.2.1
  
  # Cámara y multimedia
  camera: ^0.10.5+5
  image_picker: ^1.0.4
  
  # Ubicación y mapas
  geolocator: ^10.1.0
  permission_handler: ^11.0.1
  google_maps_flutter: ^2.5.0
  
  # UI y utilidades
  cupertino_icons: ^1.0.6
  intl: ^0.18.1
  
  # Estado y navegación
  provider: ^6.1.2
  
  # URLs y enlaces
  url_launcher: ^6.2.1
  
  # TensorFlow Lite para IA  
  tflite_flutter: ^0.11.0
  image: ^4.1.3
  
  # Http para APIs
  http: ^1.1.0
  
  # Almacenamiento local
  shared_preferences: ^2.2.2
  path_provider: ^2.1.1
  
  # Para mostrar imágenes en caché
  cached_network_image: ^3.3.0
  

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  # Assets del modelo de IA
  assets:
    - assets/modelo_colibri.tflite

  # Fuentes personalizadas (opcional)
  # fonts:
  #   - family: CustomFont
  #     fonts:
  #       - asset: assets/fonts/CustomFont-Regular.ttf
  #       - asset: assets/fonts/CustomFont-Bold.ttf
  #         weight: 700